# Faber API 数据库：Postgres + pgvector
#
# 用途：主数据库 + 情景记忆向量存储（pgvector）。
# 该镜像内置 vector 扩展，无需额外编译。
#
# 使用：
#   docker compose up -d postgres
#
# 注意：容器映射 host 5432 端口，与本机裸装 Postgres 端口一致，
# 故 app/.env 中的 SQLALCHEMY_DATABASE_URI=localhost:5432 无需改动。
# 启动前请先停掉本机可能正在占用 5432 的裸装 Postgres，或重建数据。
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: faber-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: faber
    ports:
      - "5432:5432"
    volumes:
      - faber_pgdata:/var/lib/postgresql/data

volumes:
  faber_pgdata:
